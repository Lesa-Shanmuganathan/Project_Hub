services:
  - type: web
    name: college-project-hub
    env: python
    region: oregon
    plan: free
    
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    
    startCommand: >
      gunicorn college_project_hub.wsgi:application
    
    envVars:
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: college-hub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: pserv
    name: college-hub-db
    ipAllowList: []
    plan: free
    region: oregon
    postgreSQL:
      version: 15
