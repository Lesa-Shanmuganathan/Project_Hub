{% extends 'base.html' %}

{% block title %}Delete Project - ProjectHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Delete Project</h5>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-trash display-1 text-danger mb-3"></i>
                    <h4>Are you sure?</h4>
                    <p class="text-muted">
                        You are about to delete "<strong>{{ object.title }}</strong>". 
                        This action cannot be undone.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <a href="{% url 'my_projects' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-2"></i>Delete Project
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
